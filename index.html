<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0a1730" />
<meta name="description" content="Standford 店舗ツール" />
<title>Standford</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #f4f8ff;
    --ink-dim: rgba(244, 248, 255, 0.60);
    --ink-faint: rgba(244, 248, 255, 0.36);
    --bg-0: #08122a;
    --bg-1: #16295c;
    --bg-2: #4c5e7f;
    --line: rgba(244, 248, 255, 0.16);
    --line-strong: rgba(244, 248, 255, 0.34);
    --accent: #8febff;
    --accent-dim: rgba(143, 235, 255, 0.28);
    --font-display: 'VT323', monospace;
    --font-body: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
  }

  * { box-sizing: border-box; }
  html { min-height: 100%; }

  body {
    min-height: 100vh;
    margin: 0;
    color: var(--ink);
    font-family: var(--font-body);
    background:
      radial-gradient(circle at 16% 42%, rgba(76, 130, 220, 0.16) 0%, rgba(76, 130, 220, 0) 40%),
      radial-gradient(circle at 88% 16%, rgba(143, 235, 255, 0.08) 0%, rgba(143, 235, 255, 0) 42%),
      linear-gradient(118deg, var(--bg-0) 0%, var(--bg-1) 56%, var(--bg-2) 100%);
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(244, 248, 255, 0.025) 0px,
      rgba(244, 248, 255, 0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: overlay;
    z-index: 1;
  }

  .sweep {
    position: fixed;
    left: 0;
    right: 0;
    top: 0;
    height: 40vh;
    background: linear-gradient(to bottom, rgba(143, 235, 255, 0.10), transparent);
    pointer-events: none;
    z-index: 2;
    animation: sweep-down 1100ms steps(24, end) 1;
  }

  @keyframes sweep-down {
    from { transform: translateY(-40vh); opacity: 1; }
    to { transform: translateY(150vh); opacity: 0; }
  }

  .page {
    position: relative;
    z-index: 3;
    min-height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto auto;
    padding: clamp(28px, 6vw, 88px) clamp(24px, 7vw, 112px) clamp(28px, 5vw, 56px);
  }

  .hero {
    display: grid;
    justify-items: center;
    align-content: center;
    min-height: min(40vh, 400px);
  }

  .title-wrap {
    width: min(100%, 1250px);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .title-image {
    display: block;
    width: min(100%, 947px);
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.08));
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .tool-grid {
    width: min(100%, 1320px);
    justify-self: center;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: clamp(14px, 2vw, 20px);
  }

  .tool-card {
    position: relative;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 14px;
    padding: 20px 18px 18px;
    min-height: 154px;
    text-decoration: none;
    color: var(--ink);
    background: rgba(244, 248, 255, 0.03);
    border: 1px solid var(--line);
    border-radius: 4px;
    outline: none;
    transition: border-color 140ms steps(3, end), transform 140ms steps(3, end), background 140ms steps(3, end);
  }

  .tool-id {
    font-family: var(--font-display);
    font-size: 15px;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
  }

  .tool-icon {
    display: block;
    width: 30px;
    height: 30px;
    color: var(--ink-dim);
    transition: color 140ms steps(3, end);
  }

  .tool-icon svg { display: block; width: 100%; height: 100%; }

  .tool-name {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    letter-spacing: 0.01em;
  }

  .tool-card::after {
    content: "";
    position: absolute;
    left: 18px;
    right: 18px;
    bottom: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 140ms steps(3, end);
  }

  .tool-card:hover,
  .tool-card:focus-visible {
    border-color: var(--line-strong);
    background: rgba(244, 248, 255, 0.055);
    transform: translateY(-3px);
  }

  .tool-card:hover .tool-icon,
  .tool-card:focus-visible .tool-icon {
    color: var(--accent);
  }

  .tool-card:hover::after,
  .tool-card:focus-visible::after {
    transform: scaleX(1);
  }

  .tool-card:focus-visible {
    box-shadow: 0 0 0 2px var(--accent);
  }

  .tool-card--empty {
    border-style: dashed;
    border-color: var(--line);
    color: var(--ink-faint);
  }

  .tool-card--empty .tool-icon {
    color: var(--ink-faint);
  }

  .tool-card--empty::after {
    content: none;
  }

  .tool-card--empty:hover,
  .tool-card--empty:focus-visible {
    transform: none;
    background: rgba(244, 248, 255, 0.03);
    border-color: var(--line);
  }

  .status-bar {
    justify-self: center;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: clamp(28px, 5vw, 48px);
    font-family: var(--font-display);
    font-size: 15px;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: blink 1600ms steps(1, end) infinite;
  }

  @keyframes blink {
    0%, 45% { opacity: 1; }
    50%, 95% { opacity: 0.25; }
    100% { opacity: 1; }
  }

  @media (max-width: 1000px) {
    .tool-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }

  @media (max-width: 760px) {
    .page { grid-template-rows: auto auto auto; gap: 6vh; }
    .hero { min-height: 26vh; }
    .title-image { width: min(100%, 540px); }
    .tool-grid { grid-template-columns: 1fr; }
    .tool-card { grid-template-columns: auto 1fr; grid-template-rows: auto; align-items: center; min-height: 0; padding: 16px 18px; }
    .tool-card .tool-id { grid-column: 1 / -1; }
    .tool-card::after { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .sweep { display: none; }
    .status-dot { animation: none; opacity: 1; }
    .tool-card, .tool-icon, .tool-card::after { transition: none; }
  }
</style>
</head>
