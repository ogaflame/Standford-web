<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#172b4d" />
  <meta name="description" content="Standford 店舗ツール" />
  <title>Standford</title>
  <style>
    :root {
      --ink: #f8fbff;
      --bg-left: #101c38;
      --bg-center: #163b73;
      --bg-right: #506076;
      --line: rgba(248, 251, 255, 0.72);
      --focus: #9cecff;
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 46%, rgba(13, 41, 100, 0.80) 0%, rgba(13, 41, 100, 0) 39%),
        radial-gradient(circle at 85% 20%, rgba(139, 153, 170, 0.13) 0%, rgba(139, 153, 170, 0) 42%),
        linear-gradient(112deg, var(--bg-left) 0%, var(--bg-center) 57%, var(--bg-right) 100%);
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: clamp(28px, 6vw, 88px) clamp(24px, 7vw, 112px) clamp(34px, 6vw, 76px);
      isolation: isolate;
    }

    .hero {
      display: grid;
      place-items: center;
      align-content: center;
      min-height: min(62vh, 610px);
    }

    .title-wrap {
      width: min(100%, 1250px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .title-image {
      display: block;
      width: min(100%, 947px);
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.08));
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .tool-nav {
      width: min(100%, 1250px);
      justify-self: center;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: center;
      gap: clamp(16px, 3vw, 52px);
      padding-top: 24px;
    }

    .tool-link {
      position: relative;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 2.5em;
      text-decoration: none;
      transition: transform 120ms steps(2, end);
      outline: none;
    }

    .tool-link img {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .tool-link::after {
      position: absolute;
      right: 11%;
      bottom: 0.1em;
      left: 11%;
      height: 2px;
      content: "";
      background: var(--line);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 120ms steps(2, end);
    }

    .tool-link:hover,
    .tool-link:focus-visible {
      transform: translateY(-4px);
    }

    .tool-link:hover::after,
    .tool-link:focus-visible::after {
      transform: scaleX(1);
    }

    .tool-link:focus-visible {
      box-shadow: 0 0 0 3px var(--focus);
      border-radius: 2px;
    }

    .tool-link + .tool-link::before {
      position: absolute;
      left: calc(-1 * clamp(8px, 1.5vw, 26px));
      width: 2px;
      height: 1.52em;
      content: "";
      background: var(--line);
    }

    @media (max-width: 760px) {
      .page {
        grid-template-rows: auto auto;
        gap: 7vh;
      }

      .hero { min-height: 48vh; }

      .title-image { width: min(100%, 540px); }

      .tool-nav {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .tool-link + .tool-link::before {
        top: -10px;
        left: 50%;
        width: 1.65em;
        height: 2px;
        transform: translateX(-50%);
      }

      .tool-link::after {
        right: 25%;
        left: 25%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .tool-link,
      .tool-link::after { transition: none; }
    }
  </style>
</head>
