<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#122142" />
  <meta name="description" content="Standford 店舗ツール" />
  <title>Standford</title>
  <style>
    :root {
      --ink: #f8fbff;
      --bg-left: #08173f;
      --bg-center: #17325f;
      --bg-right: #5c6678;
      --line: rgba(248, 251, 255, 0.72);
      --muted: rgba(248, 251, 255, 0.94);
      --focus: #9cecff;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 46%, rgba(10, 33, 86, 0.85) 0%, rgba(10, 33, 86, 0) 38%),
        radial-gradient(circle at 85% 20%, rgba(167, 175, 186, 0.14) 0%, rgba(167, 175, 186, 0) 42%),
        linear-gradient(112deg, var(--bg-left) 0%, var(--bg-center) 57%, var(--bg-right) 100%);
      font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", "Meiryo", "MS Gothic", sans-serif;
      overflow-x: hidden;
    }
    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 2vh;
      padding: clamp(28px, 6vw, 88px) clamp(24px, 7vw, 112px) clamp(34px, 6vw, 76px);
    }
    .hero {
      display: grid;
      place-items: center;
      align-content: center;
      min-height: min(62vh, 610px);
    }
    .title-wrap {
      width: min(100%, 760px);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .title-image {
      display: block;
      width: min(100%, 680px);
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,.06));
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
    .tool-nav {
      width: min(100%, 1250px);
      justify-self: center;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: center;
      gap: clamp(16px, 3vw, 52px);
      padding-top: 24px;
    }
    .tool-link {
      position: relative;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 2.5em;
      color: var(--muted);
      font-size: clamp(.96rem, 2vw, 1.62rem);
      font-weight: 700;
      line-height: 1.45;
      text-decoration: none;
      text-align: center;
      letter-spacing: .04em;
      transition: color 120ms ease, transform 120ms ease;
    }
    .tool-link::after {
      position: absolute;
      right: 11%; bottom: .1em; left: 11%; height: 2px;
      content: ""; background: var(--line);
      transform: scaleX(0); transform-origin: left;
      transition: transform 120ms ease;
    }
    .tool-link:hover, .tool-link:focus-visible { color: #fff; transform: translateY(-4px); outline: none; }
    .tool-link:hover::after, .tool-link:focus-visible::after { transform: scaleX(1); }
    .tool-link:focus-visible { box-shadow: 0 0 0 3px var(--focus); border-radius: 2px; }
    .tool-link + .tool-link::before {
      position: absolute;
      left: calc(-1 * clamp(8px, 1.5vw, 26px));
      width: 2px; height: 1.52em;
      content: ""; background: var(--line);
    }
    @media (max-width: 760px) {
      .page { grid-template-rows: auto auto; gap: 7vh; }
      .hero { min-height: 46vh; }
      .title-wrap { width: 100%; }
      .title-image { width: min(100%, 540px); }
      .tool-nav { grid-template-columns: 1fr; gap: 18px; }
      .tool-link + .tool-link::before { top: -10px; left: 50%; width: 1.65em; height: 2px; transform: translateX(-50%); }
      .tool-link::after { right: 25%; left: 25%; }
    }
    @media (prefers-reduced-motion: reduce) { .tool-link, .tool-link::after { transition: none; } }
  </style>
</head>
