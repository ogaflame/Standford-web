<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0a0a08" />
<title>Standford</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=VT323&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }

  :root {
    --amber: #ffb43f;
    --amber-hi: #ffcf7a;
    --amber-glow: rgba(255, 180, 63, 0.8);
  }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 50% 28%, #2c2c2c 0%, #141414 60%, #0a0a0a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(14px, 4vw, 40px);
    padding-top: clamp(84px, 12vw, 120px);
    font-family: 'DotGothic16', monospace;
  }

  /* ===== logo: bigger + glowing, with occasional neon flicker ===== */
  .logo {
    position: fixed;
    top: clamp(12px, 2.2vw, 26px);
    left: clamp(12px, 2.2vw, 26px);
    width: clamp(150px, 18vw, 240px);
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    z-index: 20;
    filter:
      drop-shadow(0 0 4px rgba(255, 200, 120, 0.9))
      drop-shadow(0 0 14px rgba(255, 180, 63, 0.55))
      drop-shadow(0 0 34px rgba(255, 160, 40, 0.3));
    animation: neon-flicker 7s steps(1, end) infinite;
  }

  @keyframes neon-flicker {
    0%, 41%, 43.5%, 45.2%, 100% { opacity: 1; }
    41.8% { opacity: 0.55; }
    44.3% { opacity: 0.75; }
    72% { opacity: 1; }
    72.6% { opacity: 0.82; }
    73.2% { opacity: 1; }
  }

  .board-frame {
    position: relative;
    width: min(100%, 880px);
    background: linear-gradient(160deg, #3d3d3d, #1c1c1c 58%, #0f0f0f);
    border-radius: 10px;
    padding: 22px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
  }

  .screw {
    position: absolute;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #6f6f6f, #202020 70%);
  }
  .screw.tl { top: 10px; left: 10px; }
  .screw.tr { top: 10px; right: 10px; }
  .screw.bl { bottom: 10px; left: 10px; }
  .screw.br { bottom: 10px; right: 10px; }

  .screen {
    position: relative;
    background: #060503;
    border-radius: 3px;
    overflow: hidden;
    padding: 4px;
    box-shadow: inset 0 0 44px rgba(0,0,0,0.85), inset 0 0 3px rgba(255,180,63,0.15);
    animation: screen-hum 9s linear infinite;
  }

  @keyframes screen-hum {
    0%, 100% { box-shadow: inset 0 0 44px rgba(0,0,0,0.85), inset 0 0 3px rgba(255,180,63,0.14); }
    50% { box-shadow: inset 0 0 44px rgba(0,0,0,0.85), inset 0 0 5px rgba(255,180,63,0.2); }
  }

  .screen::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(255,180,63,0.07) 1px, transparent 1.3px);
    background-size: 5px 5px;
    z-index: 1;
  }

  .screen::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(to bottom, rgba(0,0,0,0.22) 0px, rgba(0,0,0,0.22) 1px, transparent 1px, transparent 3px),
      radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    z-index: 2;
  }

  /* sweeping refresh line, like a display scan */
  .scanline {
    position: absolute;
    left: 0; right: 0;
    height: 26%;
    background: linear-gradient(to bottom, transparent, rgba(255,180,63,0.05), transparent);
    z-index: 2;
    pointer-events: none;
    animation: scan-move 6s linear infinite;
  }

  @keyframes scan-move {
    from { top: -30%; }
    to { top: 130%; }
  }

  .marquee {
    position: relative;
    z-index: 3;
    overflow: hidden;
    border-bottom: 1px solid rgba(255,180,63,0.22);
    padding: 8px 0;
  }

  .marquee-track {
    display: inline-block;
    white-space: nowrap;
    color: var(--amber);
    font-family: 'VT323', monospace;
    font-size: 19px;
    letter-spacing: 0.08em;
    text-shadow: 0 0 6px var(--amber-glow);
    padding-left: 100%;
    animation: scroll-left 16s linear infinite;
  }

  @keyframes scroll-left {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
  }

  .table-head {
    position: relative;
    z-index: 3;
    display: grid;
    grid-template-columns: 78px 1fr 150px 26px;
    padding: 10px 14px 8px;
    font-family: 'VT323', monospace;
    font-size: 15px;
    letter-spacing: 0.18em;
    color: rgba(255,180,63,0.45);
  }

  .board-table {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    padding: 0 4px 6px;
  }

  .row {
    display: grid;
    grid-template-columns: 78px 1fr 150px 26px;
    align-items: center;
    padding: 12px 14px;
    text-decoration: none;
    border-top: 1px solid rgba(255,180,63,0.12);
    color: var(--amber);
    transition: background 100ms steps(2, end);
    opacity: 0;
    animation: row-boot 240ms steps(4, end) forwards;
    animation-delay: var(--d);
  }

  @keyframes row-boot {
    0% { opacity: 0; }
    40% { opacity: 1; }
    55% { opacity: 0.3; }
    100% { opacity: 1; }
  }

  .row:last-child { border-bottom: 1px solid rgba(255,180,63,0.12); }

  .cell { text-shadow: 0 0 6px rgba(255,180,63,0.55); }

  .cell-code {
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: var(--amber-hi);
  }

  .cell-name { font-size: 17px; letter-spacing: 0.02em; }

  .cell-status {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 7px;
    font-family: 'VT323', monospace;
    font-size: 16px;
    letter-spacing: 0.1em;
    color: rgba(255,180,63,0.7);
  }

  .led-dot {
    width: 6px; height: 6px;
    background: var(--amber);
    box-shadow: 0 0 6px var(--amber-glow);
    animation: blink 2000ms steps(1, end) infinite;
  }

  @keyframes blink {
    0%, 60% { opacity: 1; }
    65%, 95% { opacity: 0.25; }
    100% { opacity: 1; }
  }

  .cell-arrow {
    font-size: 12px;
    text-align: right;
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 100ms steps(2,end), transform 100ms steps(2,end);
  }

  .row:hover, .row:focus-visible {
    background: rgba(255,180,63,0.09);
    outline: none;
  }
  .row:hover .cell, .row:focus-visible .cell { text-shadow: 0 0 10px rgba(255,180,63,0.95); }
  .row:hover .cell-arrow, .row:focus-visible .cell-arrow { opacity: 1; transform: translateX(0); }
  .row:focus-visible { box-shadow: inset 0 0 0 1px rgba(255,180,63,0.6); }

  .row--empty { color: rgba(255,180,63,0.28); cursor: default; }
  .row--empty .cell { text-shadow: none; }
  .row--empty .cell-status { color: rgba(255,180,63,0.28); }

  .board-footer {
    position: relative;
    z-index: 3;
    display: flex;
    justify-content: space-between;
    padding: 10px 14px 4px;
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: rgba(255,180,63,0.45);
  }

  .clock { color: rgba(255,180,63,0.8); text-shadow: 0 0 5px rgba(255,180,63,0.4); }
  .clock .colon { animation: blink 1000ms steps(1, end) infinite; }

  @media (max-width: 560px) {
    body { padding-top: clamp(110px, 26vw, 150px); }
    .table-head { display: none; }
    .row { grid-template-columns: 60px 1fr; }
    .cell-status { grid-column: 1 / 2; justify-content: flex-start; font-size: 13px; opacity: 0.75; }
    .cell-arrow { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .marquee-track, .logo, .scanline, .led-dot, .screen, .clock .colon { animation: none; }
    .row { animation: none; opacity: 1; }
  }
</style>
</head>

  <script>
    function tick() {
      var d = new Date();
      var p = function (n) { return String(n).padStart(2, "0"); };
      var el = document.getElementById("clock");
      if (el) el.innerHTML = p(d.getHours()) + '<span class="colon">:</span>' + p(d.getMinutes()) + '<span class="colon">:</span>' + p(d.getSeconds());
    }
    tick();
    setInterval(tick, 1000);
  </script>
